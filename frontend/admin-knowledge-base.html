<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Knowledge Base</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c5a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .message.show {
            display: flex;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #3a3;
            border: 1px solid #cfc;
        }

        .message-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
            padding: 0 5px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .editor-section {
            margin-bottom: 30px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .editor-label {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .char-count {
            color: #666;
            font-size: 13px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: "Courier New", monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 250px;
        }

        textarea:focus {
            outline: none;
            border-color: #c9a96e;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #1a3a5c;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2c5a8a;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #38a169;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Knowledge Base Management</h1>
        <p class="subtitle">Edit building information and concierge Q&A content</p>

        <div id="message" class="message">
            <span id="message-text"></span>
            <button class="message-close" onclick="hideMessage()">&times;</button>
        </div>

        <div class="header-actions">
            <div class="btn-group">
                <button class="btn btn-success" onclick="handleSave()" id="save-btn">Save Files</button>
                <button class="btn btn-primary" onclick="handleSync()" id="sync-btn">Sync to Tavus</button>
            </div>
            <button class="btn btn-secondary" onclick="window.location.href='/'">Back to Portal</button>
        </div>

        <div class="editor-section">
            <div class="editor-header">
                <span class="editor-label">Building Information</span>
                <span class="char-count" id="building-char-count">0 characters</span>
            </div>
            <textarea id="building-info" oninput="updateCharCount('building')"></textarea>
        </div>

        <div class="editor-section">
            <div class="editor-header">
                <span class="editor-label">Concierge Q&A</span>
                <span class="char-count" id="qa-char-count">0 characters</span>
            </div>
            <textarea id="concierge-qa" oninput="updateCharCount('qa')"></textarea>
        </div>
    </div>

    <script>
        let messageTimeout = null;

        window.addEventListener('DOMContentLoaded', init);

        async function init() {
            await loadContent();
        }

        async function loadContent() {
            try {
                const response = await fetch('/admin/knowledge-base/content');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('building-info').value = data.building_info;
                    document.getElementById('concierge-qa').value = data.concierge_qa;
                    updateCharCount('building');
                    updateCharCount('qa');
                } else {
                    showMessage('Failed to load content', 'error');
                }
            } catch (error) {
                console.error('Load error:', error);
                showMessage('Failed to load content: Network error', 'error');
            }
        }

        function updateCharCount(type) {
            if (type === 'building') {
                const textarea = document.getElementById('building-info');
                const count = document.getElementById('building-char-count');
                count.textContent = `${textarea.value.length} characters`;
            } else if (type === 'qa') {
                const textarea = document.getElementById('concierge-qa');
                const count = document.getElementById('qa-char-count');
                count.textContent = `${textarea.value.length} characters`;
            }
        }

        function showMessage(text, type = 'success') {
            const messageBox = document.getElementById('message');
            const messageText = document.getElementById('message-text');

            messageText.textContent = text;
            messageBox.className = `message show ${type}`;

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(hideMessage, 5000);
        }

        function hideMessage() {
            const messageBox = document.getElementById('message');
            messageBox.classList.remove('show');
            clearTimeout(messageTimeout);
        }

        function setButtonLoading(buttonId, loading) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                const originalText = button.textContent;
                button.dataset.originalText = originalText;
                const spinner = document.createElement('span');
                spinner.className = 'loading';
                button.textContent = '';
                button.appendChild(spinner);
                button.appendChild(document.createTextNode(originalText));
            } else {
                button.disabled = false;
                button.textContent = button.dataset.originalText || button.textContent;
            }
        }

        async function handleSave() {
            const buildingInfo = document.getElementById('building-info').value;
            const conciergeQa = document.getElementById('concierge-qa').value;

            if (!buildingInfo.trim()) {
                showMessage('Building information cannot be empty', 'error');
                return;
            }

            if (!conciergeQa.trim()) {
                showMessage('Concierge Q&A cannot be empty', 'error');
                return;
            }

            setButtonLoading('save-btn', true);
            hideMessage();

            try {
                const response = await fetch('/admin/knowledge-base/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        building_info: buildingInfo,
                        concierge_qa: conciergeQa,
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    showMessage(data.message || 'Files saved successfully', 'success');
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Save failed', 'error');
                }
            } catch (error) {
                console.error('Save error:', error);
                showMessage('Save failed: Network error', 'error');
            } finally {
                setButtonLoading('save-btn', false);
            }
        }

        async function handleSync() {
            setButtonLoading('sync-btn', true);
            hideMessage();

            try {
                const response = await fetch('/admin/knowledge-base/sync', {
                    method: 'POST',
                });

                if (response.ok) {
                    const data = await response.json();
                    const charInfo = data.chars ? ` (${data.chars} characters)` : '';
                    showMessage((data.message || 'Tavus persona updated') + charInfo, 'success');
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Sync failed', 'error');
                }
            } catch (error) {
                console.error('Sync error:', error);
                showMessage('Sync failed: Network error', 'error');
            } finally {
                setButtonLoading('sync-btn', false);
            }
        }
    </script>
</body>
</html>
