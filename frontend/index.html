<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core X Concierge Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://meet.whitelakedigital.com/external_api.js"></script>
  <script src="/frontend/daily-iframe.js"></script>
  <!-- TensorFlow.js + BlazeFace for face detection (self-hosted for offline kiosk) -->
  <script src="/frontend/vendor/tfjs-4.10.0.min.js"></script>
  <script src="/frontend/vendor/blazeface-0.0.7.js"></script>
  <style>
    :root {
      --primary: #1a3a5c;
      --primary-light: #2c5a8a;
      --accent: #c9a96e;
      --accent-light: #dfc48e;
      --bg: #f5f3ef;
      --card-bg: #ffffff;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --radius: 12px;

      /* Login palette */
      --login-bg: #0d1b2a;
      --login-bg-mid: #132d46;
      --login-surface: rgba(255, 255, 255, 0.04);
      --login-border: rgba(201, 169, 110, 0.25);
      --login-text: #e8e4dc;
      --login-text-dim: rgba(232, 228, 220, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* =====================================================
       LOGIN SCREEN
       ===================================================== */

    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--login-bg);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #login-screen.hidden {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
    }

    /* Geometric background pattern — art deco lines */
    .login-bg-pattern {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0.06;
    }

    .login-bg-pattern::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 80px,
          var(--accent) 80px,
          var(--accent) 81px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 80px,
          var(--accent) 80px,
          var(--accent) 81px
        );
      transform: rotate(45deg);
    }

    /* Radial glow behind the card */
    .login-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Login card */
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 1.5rem;
      padding: 3rem 2.5rem 2.5rem;
      background: var(--login-surface);
      border: 1px solid var(--login-border);
      border-radius: 2px;
      backdrop-filter: blur(20px);
      animation: cardReveal 0.8s ease-out both;
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Decorative corner accents */
    .login-card::before,
    .login-card::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--accent);
      border-style: solid;
    }

    .login-card::before {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    .login-card::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* Monogram / Brand mark */
    .login-monogram {
      text-align: center;
      margin-bottom: 2rem;
      animation: cardReveal 0.8s ease-out 0.15s both;
    }

    .login-monogram-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      margin-bottom: 1rem;
    }

    .login-monogram-mark span {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .login-monogram h2 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--login-text);
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }

    .login-monogram p {
      font-size: 0.78rem;
      color: var(--login-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-weight: 500;
    }

    /* Divider line */
    .login-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--login-border), transparent);
      margin-bottom: 2rem;
      animation: cardReveal 0.8s ease-out 0.25s both;
    }

    /* Form fields */
    .login-form {
      animation: cardReveal 0.8s ease-out 0.3s both;
    }

    .login-field {
      margin-bottom: 1.25rem;
    }

    .login-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--login-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .login-field input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 169, 110, 0.15);
      border-radius: 2px;
      color: var(--login-text);
      font-family: "DM Sans", sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      outline: none;
    }

    .login-field input::placeholder {
      color: rgba(232, 228, 220, 0.2);
    }

    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
    }

    /* Error state */
    .login-error {
      color: #e07a5f;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 1.2em;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .login-error.visible {
      opacity: 1;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Submit button */
    .login-btn {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: transparent;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      color: var(--accent);
      font-family: "DM Sans", sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.15), transparent);
      transition: left 0.5s ease;
    }

    .login-btn:hover {
      background: var(--accent);
      color: var(--login-bg);
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Footer text on login */
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: var(--login-text-dim);
      letter-spacing: 0.08em;
      animation: cardReveal 0.8s ease-out 0.45s both;
    }

    /* =====================================================
       APP SCREEN (existing concierge UI)
       ===================================================== */

    #app-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      animation: appFadeIn 0.5s ease-out both;
    }

    #app-screen.visible {
      display: flex;
    }

    @keyframes appFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ----- existing styles below ----- */

    header {
      background: var(--primary);
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #btn-logout {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    #btn-logout:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    header h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    header .subtitle {
      font-size: 0.85rem;
      opacity: 0.8;
      font-weight: 400;
    }

    .badge {
      background: var(--accent);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .card-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    #status {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
    }

    #status-dot.active { background: #34c759; }
    #status-dot.connecting { background: #ff9500; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .card-body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      min-height: 500px;
      justify-content: center;
    }

    .card-body.has-iframe {
      padding: 0;
      min-height: 800px;
    }

    #avatar-frame {
      width: 100%;
      height: 800px;
      border: none;
      display: block;
    }

    .welcome-text {
      text-align: center;
      max-width: 420px;
    }

    .welcome-text h3 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .welcome-text p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: "DM Sans", sans-serif;
      transition: background 0.2s, opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-start {
      background: var(--primary);
      color: #fff;
    }

    #btn-start:hover:not(:disabled) {
      background: var(--primary-light);
    }

    #btn-end {
      background: #e8e8e8;
      color: var(--text);
      display: none;
    }

    #btn-end:hover:not(:disabled) {
      background: #d4d4d4;
    }

    .error-msg {
      color: #d32f2f;
      font-size: 0.85rem;
      text-align: center;
    }

    /* Escalation transition banner */
    .escalation-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.9rem;
      display: none;
    }
    .escalation-banner.visible { display: block; }
    .escalation-banner p { margin: 0.25rem 0; }
    .escalation-banner .reason { opacity: 0.8; font-size: 0.8rem; }


    #jitsi-container {
      width: 100%;
      height: 800px;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- ==================== FACE DETECTION & BACKGROUND VIDEO ==================== -->
<!-- Hidden camera feed for face detection -->
<video id="camera-feed" autoplay playsinline muted style="display: none;"></video>
<canvas id="detection-canvas" style="display: none;"></canvas>

<!-- Background video (visible when IDLE) -->
<video id="background-video"
       src="/meridian_video.mp4"
       autoplay loop muted playsinline
       style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
              object-fit: cover; z-index: 0; transition: opacity 0.5s ease;">
</video>

<!-- Startup loader: masks camera + model initialization so the demo never looks
     "live" (attract video showing) before presence detection is actually armed.
     Visible by default; JS hides it once the kiosk is ready. -->
<style>
  #startup-loader {
    position: fixed; inset: 0; z-index: 2500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d1b2a 0%, #132d46 100%);
    color: #e8e4dc; text-align: center;
    font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
    transition: opacity 0.6s ease;
  }
  #startup-loader.hidden { opacity: 0; pointer-events: none; }
  #startup-loader .sl-mark {
    width: 72px; height: 72px; margin-bottom: 1.75rem;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #c9a96e; border-radius: 50%;
    font-family: "Playfair Display", Georgia, serif; font-size: 2rem; font-weight: 700;
    color: #c9a96e;
  }
  #startup-loader .sl-spinner {
    width: 40px; height: 40px; margin-bottom: 1.5rem;
    border: 3px solid rgba(201, 169, 110, 0.2); border-top-color: #c9a96e;
    border-radius: 50%; animation: sl-spin 0.9s linear infinite;
  }
  @keyframes sl-spin { to { transform: rotate(360deg); } }
  #startup-loader h2 {
    font-family: "Playfair Display", Georgia, serif; font-weight: 600;
    font-size: 1.5rem; letter-spacing: 0.04em; margin-bottom: 0.6rem;
  }
  #startup-loader p {
    font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(232, 228, 220, 0.5);
  }
</style>
<div id="startup-loader">
  <div class="sl-mark">X</div>
  <div class="sl-spinner"></div>
  <h2>Preparing the concierge</h2>
  <p id="startup-loader-status">Starting up…</p>
</div>

<!-- Error overlay for camera/connection issues -->
<div id="error-overlay" style="display: none; position: fixed; inset: 0; z-index: 2000;
     background: rgba(0, 0, 0, 0.9); align-items: center; justify-content: center;">
  <div style="text-align: center; color: white; padding: 2rem;">
    <h2 id="error-title" style="margin-bottom: 1rem;">Error</h2>
    <p id="error-message" style="margin-bottom: 2rem;">Something went wrong</p>
    <button id="error-reload-btn" onclick="location.reload()"
            style="padding: 0.75rem 2rem; background: var(--accent); border: none;
                   border-radius: 4px; color: white; font-size: 1rem; cursor: pointer;">
      Reload
    </button>
  </div>
</div>

<!-- Debug panel (can be hidden in production) -->
<div id="debug-panel" style="position: fixed; top: 10px; right: 10px; z-index: 3000;
     background: rgba(0, 0, 0, 0.8); color: white; padding: 1rem; border-radius: 8px;
     font-family: monospace; font-size: 12px; min-width: 200px;">
  <div><strong>State:</strong> <span id="debug-state">LOADING</span></div>
  <div><strong>Faces:</strong> <span id="debug-faces">0</span></div>
  <div><strong>Timer:</strong> <span id="debug-timer">-</span></div>
  <div><strong>FPS:</strong> <span id="debug-fps">-</span></div>
</div>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen">
  <div class="login-bg-pattern"></div>
  <div class="login-glow"></div>

  <div class="login-card">
    <div class="login-monogram">
      <div class="login-monogram-mark"><span>X</span></div>
      <h2>Core X</h2>
      <p>Concierge Portal</p>
    </div>

    <div class="login-divider"></div>

    <form class="login-form" id="login-form" autocomplete="off">
      <div class="login-field">
        <label for="login-userselect">Building</label>
        <select id="login-userselect" style="width: 100%; padding: 0.8rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(201, 169, 110, 0.15); border-radius: 2px; color: var(--login-text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; cursor: pointer;">
          <option value="admin">Admin / Meridian Building</option>
          <option value="buildingB">Building B</option>
        </select>
      </div>
      <div class="login-field">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" placeholder="Enter username" readonly style="background: rgba(255, 255, 255, 0.02);" />
      </div>
      <div class="login-field">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" placeholder="Enter password" />
      </div>
      <p class="login-error" id="login-error">Invalid credentials. Please try again.</p>
      <button type="submit" class="login-btn">Enter</button>
    </form>

    <p class="login-footer">Authorized personnel only</p>
  </div>
</div>

<!-- ==================== APP SCREEN ==================== -->
<div id="app-screen">
  <header>
    <div>
      <h1>Core X</h1>
      <span class="subtitle">Concierge Portal</span>
    </div>
    <div class="header-right">
      <span class="badge">AI Assisted</span>
      <button id="btn-kb" onclick="navigateToKB()" style="background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 6px; cursor: pointer; margin-right: 0.5rem;">Update KB</button>
      <button id="btn-history" onclick="window.location.href='/conversations'" style="background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 6px; cursor: pointer; margin-right: 0.5rem;">Conversation History</button>
      <button id="btn-logout">Logout</button>
    </div>
  </header>

<script>
  /* ========================
     GLOBAL VARIABLES
     ======================== */
  const API_BASE = window.location.origin;
  // API_BASE = 'http://localhost:8001'
  let conversationId = null;
  let conversationUrl = null;
  let dailyCall = null;
  let jitsiApi = null;

  /* ========================
     AUTO-RESUME FROM JITSI
     ======================== */
  // Check if user is returning from Jitsi redirect
  var urlParams = new URLSearchParams(window.location.search);
  var resumeConversationId = urlParams.get('resume');

  /* ========================
     LOGIN LOGIC
     ======================== */
  const VALID_USERS = { "admin": "meridian", "buildingB": "meridian" };

  const loginScreen = document.getElementById("login-screen");
  const appScreen = document.getElementById("app-screen");
  const loginForm = document.getElementById("login-form");
  const loginError = document.getElementById("login-error");
  const loginUser = document.getElementById("login-user");
  const loginPass = document.getElementById("login-pass");
  const loginUserSelect = document.getElementById("login-userselect");

  // Pre-fill username based on dropdown selection
  function updateUsernameField() {
    loginUser.value = loginUserSelect.value;
  }

  // Initialize on page load
  updateUsernameField();

  // Update on dropdown change
  loginUserSelect.addEventListener("change", updateUsernameField);

  // Check for existing session cookie — skip login if present
  var hasSession = document.cookie.split(";").some(function(c) {
    return c.trim().indexOf("concierge_session=") === 0;
  });

  if (hasSession && !resumeConversationId) {
    console.log("[Session] Existing session found, skipping login");
    // Restore username from sessionStorage if available
    var storedUser = sessionStorage.getItem("currentUser");
    if (storedUser && (storedUser === "admin" || storedUser === "buildingB")) {
      loginUserSelect.value = storedUser;
      updateUsernameField();
    }
    loginScreen.style.display = "none";
    appScreen.classList.add("visible");
  }

  // Auto-bypass login and start fresh conversation when returning from Jitsi
  if (resumeConversationId) {
    console.log("[Resume] Auto-login and starting fresh conversation");

    // Hide login, show app immediately
    loginScreen.style.display = "none";
    appScreen.classList.add("visible");

    // Show welcome message
    setTimeout(function() {
      var banner = document.getElementById("escalation-banner");
      var reasonEl = document.getElementById("escalation-reason");
      banner.classList.add("visible");
      reasonEl.textContent = "Welcome back! Starting a fresh conversation...";

      // Clear URL parameter
      window.history.replaceState({}, document.title, window.location.pathname);

      // Auto-click "Start Conversation" button after banner shows
      setTimeout(function() {
        banner.classList.remove("visible");
        document.getElementById("btn-start").click();
      }, 2000);
    }, 500);
  }

  loginForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const user = loginUser.value.trim();
    const pass = loginPass.value;

    if (VALID_USERS[user] && pass === VALID_USERS[user]) {
      // Set session cookie — expires in 7 days
      var expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
      document.cookie = "concierge_session=1; expires=" + expires + "; path=/; SameSite=Strict";

      // Store current user in sessionStorage
      sessionStorage.setItem("currentUser", user);

      loginError.classList.remove("visible");
      loginScreen.classList.add("hidden");
      setTimeout(() => {
        loginScreen.style.display = "none";
        appScreen.classList.add("visible");

        // Auto-start conversation after login
        setTimeout(() => {
          console.log("[Auto-start] Starting conversation for user:", user);
          document.getElementById("btn-start").click();
        }, 500);
      }, 600);
    } else {
      loginError.classList.add("visible");
      loginPass.value = "";
      loginPass.focus();
    }
  });

  /* ========================
     LOGOUT LOGIC
     ======================== */
  function logout() {
    // End any active conversation first
    if (conversationId) {
      fetch(API_BASE + "/api/conversations/" + conversationId + "/end", {
        method: "POST",
      }).catch(() => {});
    }

    // Clean up everything
    endEverything();

    cardBody.classList.remove("has-iframe");
    welcome.style.display = "block";
    actions.style.display = "flex";
    actions.style.padding = "";
    btnStart.style.display = "inline-block";
    btnStart.disabled = false;
    btnEnd.style.display = "none";
    btnEnd.disabled = false;
    conversationId = null;
    clearError();
    setStatus("Ready", "");

    // Clear session cookie
    document.cookie = "concierge_session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Strict";

    sessionStorage.removeItem("currentUser");

    // Hide app screen and show login screen
    appScreen.classList.remove("visible");
    loginScreen.style.display = "flex";
    setTimeout(() => {
      loginScreen.classList.remove("hidden");
      loginUser.value = "";
      loginPass.value = "";
      loginError.classList.remove("visible");
      loginUser.focus();
    }, 50);
  }

  /* ========================
     CONVERSATION LOGIC
     ======================== */
  const btnStart = document.getElementById("btn-start");
  const btnEnd = document.getElementById("btn-end");
  const cardBody = document.getElementById("card-body");
  const welcome = document.getElementById("welcome");
  const actions = document.getElementById("actions");
  const statusDot = document.getElementById("status-dot");
  const statusLabel = document.getElementById("status-label");
  const errorEl = document.getElementById("error");

  function setStatus(label, state) {
    if (statusDot) statusDot.className = state || "";
    if (statusLabel) statusLabel.textContent = label;
  }

  function showError(msg) {
    if (!errorEl) return;
    errorEl.textContent = msg;
    errorEl.style.display = "block";
  }

  function clearError() {
    if (errorEl) errorEl.style.display = "none";
  }

  if (btnStart) btnStart.addEventListener("click", async () => {
    clearError();
    btnStart.disabled = true;
    setStatus("Connecting...", "connecting");

    // Check if Daily.js is loaded
    if (!window.Daily) {
      showError("Failed to load Daily.js library. Please refresh the page.");
      btnStart.disabled = false;
      setStatus("Error", "");
      return;
    }

    try {
      var username = sessionStorage.getItem("currentUser") || "admin";

      const res = await fetch(API_BASE + "/api/conversations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username })
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || "Server error " + res.status);
      }

      const data = await res.json();
      conversationId = data.conversation_id;
      conversationUrl = data.conversation_url;  // Store for later rejoin

      if (!conversationUrl) throw new Error("No conversation URL returned");

      // Switch to Daily call view
      welcome.style.display = "none";
      actions.style.display = "none";
      cardBody.classList.add("has-iframe");

      // Use Daily JS SDK to join the Tavus conversation
      dailyCall = window.Daily.createFrame(cardBody, {
        iframeStyle: {
          width: "100%",
          height: "800px",
          border: "none",
        },
        showLeaveButton: false,
        showFullscreenButton: false,
        showParticipantsBar: false,
      });

      // Listen for tool call events from Tavus CVI
      dailyCall.on("app-message", function (event) {
        var msg = event.data;
        if (!msg) return;

        // Log non-utterance events for debugging
        if (msg.event_type && msg.event_type !== "conversation.utterance") {
          console.log("[Daily app-message] event_type:", msg.event_type, msg);
        }

        // Detect tool call by event_type
        if (msg.event_type === "conversation.tool_call" || msg.message_type === "tool_call") {
          console.log("[Tool Call Event]", JSON.stringify(msg, null, 2));
          handleToolCall(msg);
          return;
        }

        // Fallback: check properties for tool-related fields
        var props = msg.properties || {};
        if (props.tool_name || props.function_name) {
          console.log("[Tool Call via properties]", JSON.stringify(msg, null, 2));
          handleToolCall({
            function_name: props.tool_name || props.function_name,
            function_args: props.arguments || props.function_args || {},
          });
        }
      });

      await dailyCall.join({ url: conversationUrl });

      // Show end button below Daily frame
      actions.style.display = "flex";
      actions.style.padding = "1rem 2rem";
      btnStart.style.display = "none";
      btnEnd.style.display = "inline-block";

      setStatus("Active", "active");
    } catch (err) {
      showError(err.message);
      btnStart.disabled = false;
      setStatus("Error", "");
    }
  });

  function handleToolCall(msg) {
    var props = msg.properties || {};
    var toolName = msg.function_name || msg.tool_name || msg.name
      || props.function_name || props.tool_name || props.name || "";
    var args = msg.function_args || msg.arguments || msg.args
      || props.function_args || props.arguments || props.args || {};

    console.log("[Tool Call] name:", toolName, "args:", args);

    if (typeof args === "string") {
      try { args = JSON.parse(args); } catch (e) {}
    }

    if (toolName === "escalate_to_human") {
      // Call backend to create Jitsi room
      fetch(API_BASE + "/api/escalate-to-human", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          reason: args.reason || "User needs human assistance",
          user_question: args.user_question || "",
        }),
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.meeting_url) {
            console.log("[Escalation] Waiting for avatar to finish speaking...");
            waitForAvatarDone(function() {
              handleEscalation({
                meeting_url: data.meeting_url,
                room_id: data.room_id,
                reason: args.reason || "",
              });
            });
          }
        })
        .catch(function (err) {
          console.error("Escalation API error:", err);
        });
    }
  }

  if (btnEnd) btnEnd.addEventListener("click", async () => {
    btnEnd.disabled = true;
    setStatus("Ending...", "connecting");

    try {
      if (conversationId) {
        await fetch(API_BASE + "/api/conversations/" + conversationId + "/end", {
          method: "POST",
        });
      }
    } catch (_) {
      // Best-effort
    }

    endEverything();
  });

  /* ========================
     KB NAVIGATION
     ======================== */
  function navigateToKB() {
    var username = sessionStorage.getItem("currentUser") || "admin";
    window.location.href = "/admin/knowledge-base?user=" + username;
  }

  /* ========================
     LOGOUT BUTTON
     ======================== */
  const btnLogout = document.getElementById("btn-logout");
  btnLogout.addEventListener("click", logout);

  /* ========================
     JITSI ESCALATION LOGIC
     ======================== */

  // Wait until the avatar finishes speaking, then invoke the callback.
  // Listens for utterance events — when no new speech arrives for 2s, it's done.
  // Falls back after 30s max to avoid hanging forever.
  function waitForAvatarDone(callback) {
    var silenceTimer = null;
    var maxTimer = null;
    var listener = null;
    var called = false;

    function finish() {
      if (called) return;
      called = true;
      clearTimeout(silenceTimer);
      clearTimeout(maxTimer);
      if (listener && dailyCall) {
        dailyCall.off("app-message", listener);
      }
      console.log("[Escalation] Avatar finished speaking, proceeding in 2s...");
      setTimeout(callback, 2000);
    }

    // Each time the avatar speaks, reset the silence timer
    listener = function(event) {
      var msg = event.data;
      if (!msg) return;
      var eventType = msg.event_type || "";
      if (eventType === "conversation.utterance" && msg.properties && msg.properties.role === "replica") {
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(finish, 2000);
      }
    };

    if (dailyCall) {
      dailyCall.on("app-message", listener);
    }

    // Start an initial silence timer — if the avatar never speaks, proceed after 5s
    silenceTimer = setTimeout(finish, 5000);

    // Hard max wait to avoid hanging indefinitely
    maxTimer = setTimeout(finish, 30000);
  }

  function handleEscalation(data) {
    // Show escalation banner
    var banner = document.getElementById("escalation-banner");
    var reasonEl = document.getElementById("escalation-reason");
    banner.classList.add("visible");
    reasonEl.textContent = data.reason || "";

    setStatus("Escalating...", "connecting");

    // Hide and mute the Daily call — keep the session alive so we can resume
    if (dailyCall) {
      dailyCall.setLocalAudio(false);
      dailyCall.setLocalVideo(false);
      var dailyIframe = dailyCall.iframe();
      if (dailyIframe) dailyIframe.style.display = "none";
      console.log("[Tavus] Call hidden and muted - session stays alive");
    }

    // Create Jitsi container
    var jitsiContainer = document.createElement("div");
    jitsiContainer.id = "jitsi-container";
    cardBody.insertBefore(jitsiContainer, cardBody.firstChild);

    // Extract room name from meeting_url
    var urlParts = data.meeting_url.split("/");
    var roomName = urlParts[urlParts.length - 1];

    // Build redirect URL that agent can use to send customer back
    var redirectUrl = window.location.origin + "/?resume=" + conversationId;

    // Initialize Jitsi with display name and subject showing redirect URL
    jitsiApi = new JitsiMeetExternalAPI("meet.whitelakedigital.com", {
      roomName: roomName,
      parentNode: jitsiContainer,
      userInfo: {
        displayName: "support-user"
      },
      configOverwrite: {
        startWithAudioMuted: false,
        startWithVideoMuted: false,
        prejoinPageEnabled: false,
        disableDeepLinking: true,
        subject: "Customer Redirect: " + redirectUrl,
      },
      interfaceConfigOverwrite: {
        TOOLBAR_BUTTONS: [
          "microphone", "camera", "desktop", "chat",
          "hangup", "fullscreen", "settings"
        ],
        SHOW_JITSI_WATERMARK: false,
      },
    });

    // When Jitsi is ready, check if a human agent is already in the room
    var agentFound = false;
    var agentCheckTimer = null;

    jitsiApi.addEventListener("videoConferenceJoined", function () {
      // Check current participant count (includes self)
      var count = jitsiApi.getNumberOfParticipants();
      console.log("[Jitsi] Joined room, participants:", count);

      if (count > 1) {
        // Agent is already here
        agentFound = true;
        setStatus("Agent Connected", "active");
        banner.classList.remove("visible");
      } else {
        // No agent yet — wait up to 10 seconds for one to appear
        setStatus("Waiting for Agent...", "connecting");
        reasonEl.textContent = "Checking if a human agent is available...";

        agentCheckTimer = setTimeout(function() {
          if (!agentFound) {
            console.log("[Jitsi] No agent available after timeout");
            reasonEl.textContent = "Sorry, no human agent is available to receive your call right now.";
            banner.classList.add("visible");

            // Wait 3 seconds so user can read the message, then resume avatar
            setTimeout(function() {
              jitsiResume("No agent available");
            }, 3000);
          }
        }, 10000);
      }

      // Send chat message with redirect URL
      setTimeout(function () {
        jitsiApi.executeCommand("sendChatMessage",
          "ℹ️ Customer return URL: " + redirectUrl + "\n\nKick the customer to redirect them back to the AI concierge."
        );
      }, 1000);
    });

    // Update status when agent joins (during or after the wait)
    jitsiApi.addEventListener("participantJoined", function () {
      agentFound = true;
      clearTimeout(agentCheckTimer);
      setStatus("Agent Connected", "active");
      banner.classList.remove("visible");
    });

    // Handle when the local user leaves the conference (includes being kicked)
    var jitsiResumed = false;
    function jitsiResume(reason) {
      if (jitsiResumed) return;
      jitsiResumed = true;
      console.log("[Jitsi] " + reason + " - resuming conversation");
      resumeTavusConversation();
    }

    jitsiApi.addEventListener("videoConferenceLeft", function (event) {
      jitsiResume("Local user left conference (kicked or hangup)");
    });

    jitsiApi.addEventListener("readyToClose", function () {
      jitsiResume("Jitsi ready to close");
    });

    // Hide end button during Jitsi call
    btnEnd.style.display = "none";

    setStatus("Waiting for Agent", "connecting");
  }

  function resumeTavusConversation() {
    // Cleanup Jitsi
    if (jitsiApi) {
      jitsiApi.dispose();
      jitsiApi = null;
    }
    var jitsiContainer = document.getElementById("jitsi-container");
    if (jitsiContainer) jitsiContainer.remove();

    document.getElementById("escalation-banner").classList.remove("visible");

    // Unhide and unmute the Daily call — session was kept alive
    if (dailyCall) {
      var dailyIframe = dailyCall.iframe();
      if (dailyIframe) dailyIframe.style.display = "";
      dailyCall.setLocalAudio(true);
      dailyCall.setLocalVideo(true);

      console.log("[Resume] Tavus conversation resumed");
      setStatus("Active", "active");
      btnEnd.style.display = "inline-block";
    } else {
      console.error("[Resume] No active Daily call to resume");
      showError("Cannot resume conversation. Please start a new one.");
      endEverything();
    }
  }

  function endEverything() {
    // Cleanup Jitsi
    if (jitsiApi) {
      jitsiApi.dispose();
      jitsiApi = null;
    }
    var jitsiContainer = document.getElementById("jitsi-container");
    if (jitsiContainer) jitsiContainer.remove();

    document.getElementById("escalation-banner").classList.remove("visible");

    // End Daily call completely
    if (dailyCall) {
      dailyCall.leave().catch(function () {});
      dailyCall.destroy();
      dailyCall = null;
    }

    // Reset to initial state
    cardBody.classList.remove("has-iframe");
    welcome.style.display = "block";
    actions.style.display = "flex";
    actions.style.padding = "";
    btnStart.style.display = "inline-block";
    btnStart.disabled = false;
    btnEnd.style.display = "none";
    btnEnd.disabled = false;
    conversationId = null;
    conversationUrl = null;  // Clear stored URL
    setStatus("Ready", "");
  }
</script>

<!-- Face Detection and State Machine Modules -->
<script src="/frontend/face-detection.js"></script>
<script src="/frontend/state-machine.js"></script>

<!-- Kiosk Mode Initialization -->
<script>
  /* ========================
     KIOSK MODE - AUTO-START CONVERSATION
     ======================== */

  // Global instances
  let faceDetector = null;
  let stateMachine = null;
  let kioskUsername = null;

  // Debug panel update interval
  let debugInterval = null;

  /**
   * Initialize kiosk mode on page load
   */
  async function initKioskMode() {
    console.log('[Kiosk] Initializing kiosk mode...');

    // Extract building from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const buildingParam = urlParams.get('building') || 'meridian';

    // Map building to username
    const BUILDING_MAP = {
      'meridian': 'admin',
      'buildingB': 'buildingB'
    };

    kioskUsername = BUILDING_MAP[buildingParam] || 'admin';
    console.log(`[Kiosk] Building: ${buildingParam}, Username: ${kioskUsername}`);

    // Auto-create session (skip login)
    const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = `concierge_session=1; expires=${expires}; path=/; SameSite=Strict`;
    sessionStorage.setItem('currentUser', kioskUsername);

    // Hide login screen, show app
    loginScreen.style.display = 'none';
    appScreen.classList.add('visible');

    // Hide start/end buttons (auto-controlled now) — may be absent if the card
    // markup was removed.
    if (btnStart) btnStart.style.display = 'none';
    if (btnEnd) btnEnd.style.display = 'none';

    // Initialize face detector
    faceDetector = new FaceDetectionManager({
      minConfidence: 0.75,
      minFaceSize: 0.15,
      idleFps: 5,
      activeFps: 2
    });

    // Initialize camera
    updateStartupStatus('Requesting camera…');
    const cameraOk = await faceDetector.initCamera();
    if (!cameraOk) {
      showErrorOverlay('Camera Access Required',
        'This kiosk needs camera access to detect your presence. Please allow camera access and reload.');
      return;
    }

    // Load face detection model
    updateStartupStatus('Loading assistant…');
    const modelOk = await faceDetector.loadModel();
    if (!modelOk) {
      showErrorOverlay('Model Loading Failed',
        'Failed to load face detection model. Please check your connection and reload.');
      return;
    }

    // Initialize state machine
    stateMachine = new ConversationStateMachine({
      faceDetectedDelay: 1500,  // 1.5 seconds
      faceGoneDelay: 10000,      // 10 seconds
      errorRecoveryDelay: 5000   // 5 seconds
    });

    // Set up state machine callbacks
    stateMachine.setStateChangeCallback(onStateChange);
    stateMachine.setStartConversationCallback(startConversationAuto);
    stateMachine.setEndConversationCallback(endConversationAuto);

    // Start face detection
    faceDetector.startDetection((facePresent, faceCount) => {
      stateMachine.handleFaceDetection(facePresent, faceCount);
      updateDebugPanel(facePresent, faceCount);
    }, 'idle');

    // Start debug panel updates
    debugInterval = setInterval(updateDebugPanelTimer, 100);

    console.log('[Kiosk] Initialization complete - ready for face detection');
    console.log('[Kiosk] Face detector:', faceDetector ? 'OK' : 'MISSING');
    console.log('[Kiosk] State machine:', stateMachine ? 'OK' : 'MISSING');
    console.log('[Kiosk] Daily.js:', window.Daily ? 'OK' : 'MISSING');
    console.log('[Kiosk] Username:', kioskUsername);
    updateDebugState('IDLE');

    // Everything is armed — reveal the live attract screen.
    updateStartupStatus('Ready');
    hideStartupLoader();
  }

  /**
   * Always returns a valid conversation mount. If the card markup (#card-body)
   * was removed — the kiosk idle screen is just the attract video — this creates
   * a fullscreen mount on the fly so the Tavus/Daily room still has somewhere to
   * render and nothing null-crashes.
   */
  function getConversationMount() {
    let el = document.getElementById('card-body');
    if (!el) {
      el = document.createElement('div');
      el.id = 'card-body';
      el.className = 'card-body';
      el.style.cssText =
        'position:fixed; inset:0; z-index:5; opacity:0; transition:opacity 0.5s ease;';
      document.body.appendChild(el);
      console.log('[Kiosk] Created fallback fullscreen #card-body mount');
    }
    return el;
  }

  /**
   * Handle state changes. All DOM lookups are null-safe so a removed element can
   * never throw mid-transition (which previously wedged the state machine in
   * STARTING_CONVERSATION because onStateEnter never ran).
   */
  function onStateChange(newState, oldState) {
    console.log(`[Kiosk] State changed: ${oldState} → ${newState}`);
    updateDebugState(newState);

    const bgVideo = document.getElementById('background-video');
    const cardBody = getConversationMount();  // never null
    const showVideo = (show) => { if (bgVideo) bgVideo.style.display = show ? 'block' : 'none'; };
    const fadeVideo = (o) => { if (bgVideo) bgVideo.style.opacity = o; };

    switch (newState) {
      case 'IDLE':
        showVideo(true);
        fadeVideo('1');
        cardBody.style.opacity = '0';
        // Re-acquire the camera (released while Daily had the call) and resume
        // presence detection. No-op if we still hold the camera.
        if (faceDetector) {
          faceDetector.resumeCamera('idle').catch(err =>
            console.error('[Kiosk] Failed to resume camera:', err));
        }
        break;

      case 'STARTING_CONVERSATION':
        fadeVideo('0');
        cardBody.style.opacity = '0';
        setTimeout(() => showVideo(false), 500);
        break;

      case 'CONVERSATION_ACTIVE':
        showVideo(false);
        cardBody.style.opacity = '1';
        cardBody.style.transition = 'opacity 0.5s ease-in';
        if (faceDetector) faceDetector.setDetectionMode('active');
        break;

      case 'ENDING_CONVERSATION':
      case 'ERROR_RECOVERY':
        cardBody.style.opacity = '0';
        break;
    }
  }

  /**
   * Start conversation automatically (called by state machine)
   */
  async function startConversationAuto() {
    console.log('[Kiosk] Auto-starting conversation...');

    // Track a conversation created in THIS attempt so we can end it if the join
    // fails — otherwise orphaned Tavus rooms pile up into a 503 concurrency cap.
    let createdConversationId = null;

    try {
      console.log('[Kiosk] Step 1: Fetching conversation from API...');
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      const response = await fetch(`${API_BASE}/api/conversations`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: kioskUsername }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);
      console.log('[Kiosk] Step 2: API response received, status:', response.status);

      if (!response.ok) {
        // Handle 503 service unavailable (concurrent limit reached)
        if (response.status === 503) {
          const errorData = await response.json().catch(() => ({}));
          const retryAfter = errorData.retry_after || 30;
          throw new Error(`SERVICE_UNAVAILABLE:${retryAfter}`);
        }
        throw new Error(`Server error: ${response.status}`);
      }

      const data = await response.json();
      conversationId = data.conversation_id;
      conversationUrl = data.conversation_url;
      createdConversationId = conversationId;

      console.log('[Kiosk] Step 3: Conversation created:', conversationId);
      console.log('[Kiosk] Step 4: Conversation URL:', conversationUrl);

      // Check if Daily is loaded
      if (!window.Daily) {
        throw new Error('Daily.js library not loaded');
      }
      console.log('[Kiosk] Step 5: Daily.js library confirmed loaded');

      // Create Daily.js iframe (mount self-heals if the card markup was removed)
      const cardBody = getConversationMount();
      console.log('[Kiosk] Step 6: conversation mount ready');

      // Destroy any existing Daily frame before creating a new one
      if (dailyCall) {
        console.log('[Kiosk] Step 6.5: Cleaning up existing Daily frame');
        try {
          await dailyCall.destroy();
        } catch (e) {
          console.warn('[Kiosk] Error destroying existing frame:', e);
        }
        dailyCall = null;
      }

      // Hand the camera to Daily BEFORE it joins. The face detector holds the
      // webcam via getUserMedia; if we don't release it first, Daily contends
      // for the same device and the join hangs (~30s) then times out.
      if (faceDetector) {
        faceDetector.releaseCamera();
      }

      dailyCall = window.Daily.createFrame(cardBody, {
        iframeStyle: { width: '100%', height: '800px', border: 'none' },
        showLeaveButton: false,
        showFullscreenButton: false,
        showParticipantsBar: false
      });
      console.log('[Kiosk] Step 7: Daily frame created');

      // Listen for tool calls
      dailyCall.on('app-message', handleToolCall);
      console.log('[Kiosk] Step 8: Tool call listener attached');

      // If the room ends on its own (visitor walks away -> Tavus absent/duration
      // timeout, or the replica leaves), return to idle and free the camera.
      dailyCall.on('left-meeting', () => {
        console.log('[Kiosk] Daily left-meeting — session ended remotely');
        if (stateMachine && stateMachine.getState() === 'CONVERSATION_ACTIVE') {
          stateMachine.setState('ENDING_CONVERSATION');
        }
      });

      // Wait for joined-meeting event instead of relying on join() promise
      console.log('[Kiosk] Step 9: Attempting to join conversation...');

      const joinedPromise = new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          dailyCall.off('joined-meeting', onJoined);
          dailyCall.off('error', onError);
          reject(new Error('Join timeout after 30 seconds'));
        }, 30000);

        const onJoined = (event) => {
          clearTimeout(timeout);
          dailyCall.off('error', onError);
          console.log('[Kiosk] joined-meeting event received:', event);
          resolve(event);
        };

        const onError = (error) => {
          clearTimeout(timeout);
          dailyCall.off('joined-meeting', onJoined);
          console.error('[Kiosk] Daily.js error event:', error);
          reject(error);
        };

        dailyCall.on('joined-meeting', onJoined);
        dailyCall.on('error', onError);

        // Start the join
        dailyCall.join({ url: conversationUrl }).catch(reject);
      });

      await joinedPromise;
      console.log('[Kiosk] Step 10: Successfully joined conversation!');
      setStatus('Active', 'active');

      return conversationId;

    } catch (error) {
      console.error('[Kiosk] Failed at step, error:', error);
      console.error('[Kiosk] Error name:', error.name);
      console.error('[Kiosk] Error message:', error.message);
      console.error('[Kiosk] Full error:', error);

      // Tear down a half-open room so failed attempts don't accumulate into a
      // Tavus concurrency 503. (Camera is re-acquired by the IDLE state handler.)
      try {
        if (dailyCall) {
          await dailyCall.leave().catch(() => {});
          await dailyCall.destroy().catch(() => {});
          dailyCall = null;
        }
      } catch (e) {
        console.warn('[Kiosk] Cleanup: Daily teardown failed:', e);
      }
      if (createdConversationId) {
        try {
          await fetch(`${API_BASE}/api/conversations/${createdConversationId}/end`, { method: 'POST' });
          console.log('[Kiosk] Cleanup: ended orphaned conversation', createdConversationId);
        } catch (e) {
          console.warn('[Kiosk] Cleanup: failed to end conversation:', e);
        }
      }
      conversationId = null;

      if (error.name === 'AbortError') {
        showErrorOverlay('Connection Timeout', 'Failed to connect to Tavus API. Returning to idle...');
      } else if (error.message && error.message.startsWith('SERVICE_UNAVAILABLE:')) {
        // Extract retry_after seconds from error message
        const retryAfter = parseInt(error.message.split(':')[1]) || 30;
        console.log(`[Kiosk] Service unavailable, will retry after ${retryAfter}s`);

        // Return error with retry info instead of showing overlay
        const retryError = new Error('Service temporarily unavailable');
        retryError.retryAfter = retryAfter;
        throw retryError;
      } else {
        showErrorOverlay('Connection Failed', `${error.message || 'Unknown error'}\n\nCheck browser console (F12) for details.`);
      }
      throw error;
    }
  }

  /**
   * End conversation automatically (called by state machine)
   */
  async function endConversationAuto(convId) {
    console.log('[Kiosk] Auto-ending conversation:', convId);

    try {
      // Call backend to end conversation
      await fetch(`${API_BASE}/api/conversations/${convId}/end`, {
        method: 'POST'
      });

      // Clean up Daily call
      if (dailyCall) {
        await dailyCall.leave().catch(() => {});
        dailyCall.destroy();
        dailyCall = null;
      }

      // Reset UI
      setStatus('Ready', '');
      conversationId = null;
      conversationUrl = null;

      console.log('[Kiosk] Conversation ended successfully');

    } catch (error) {
      console.error('[Kiosk] Error ending conversation:', error);
      // Don't throw - always return to IDLE even if cleanup fails
    }
  }

  /**
   * Show error overlay
   */
  /**
   * Startup loader controls (covers the screen during camera + model init).
   */
  function updateStartupStatus(msg) {
    const el = document.getElementById('startup-loader-status');
    if (el && msg) el.textContent = msg;
  }

  function hideStartupLoader() {
    const sl = document.getElementById('startup-loader');
    if (!sl) return;
    sl.classList.add('hidden');
    setTimeout(() => { sl.style.display = 'none'; }, 650);
  }

  function showErrorOverlay(title, message) {
    // An error supersedes the startup loader — make sure it's not covering it.
    hideStartupLoader();

    const overlay = document.getElementById('error-overlay');
    const titleEl = document.getElementById('error-title');
    const messageEl = document.getElementById('error-message');

    titleEl.textContent = title;
    messageEl.textContent = message;
    overlay.style.display = 'flex';

    // Auto-hide after 5 seconds for non-critical errors
    if (!title.includes('Required') && !title.includes('Access')) {
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 5000);
    }
  }

  /**
   * Update debug panel
   */
  function updateDebugPanel(facePresent, faceCount) {
    document.getElementById('debug-faces').textContent = faceCount;
    const avgInference = faceDetector ? Math.round(faceDetector.getAverageInferenceTime()) : 0;
    document.getElementById('debug-fps').textContent = `${avgInference}ms`;
  }

  function updateDebugState(state) {
    document.getElementById('debug-state').textContent = state;
  }

  function updateDebugPanelTimer() {
    if (!stateMachine) return;
    const status = stateMachine.getTimerStatus();

    let timerText = '-';
    if (status.faceDetectedTimer !== null) {
      timerText = `Start: ${Math.round(status.faceDetectedTimer)}ms`;
    } else if (status.faceGoneTimer !== null) {
      timerText = `End: ${Math.round(status.faceGoneTimer)}ms`;
    }

    document.getElementById('debug-timer').textContent = timerText;
  }

  // Initialize kiosk mode when page loads
  window.addEventListener('DOMContentLoaded', () => {
    initKioskMode().catch(error => {
      console.error('[Kiosk] Initialization failed:', error);
      showErrorOverlay('Initialization Failed', 'Failed to start kiosk mode. Please reload.');
    });
  });

  // Clean up on page unload
  window.addEventListener('beforeunload', () => {
    if (debugInterval) clearInterval(debugInterval);
    if (faceDetector) faceDetector.dispose();
    if (stateMachine) stateMachine.dispose();
  });
</script>

</body>
</html>
